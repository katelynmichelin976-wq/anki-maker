<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星际雷霆 - 太空射击</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: #000;
            overflow: hidden;
            color: #fff;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(ellipse at center, #0a0e27 0%, #000000 100%);
            overflow: hidden;
        }

        #stars {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        #game-canvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2),
                        inset 0 0 50px rgba(0, 50, 100, 0.3);
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            font-family: 'Orbitron', monospace;
            font-size: 18px;
            color: #0ff;
            text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
            z-index: 10;
        }

        .hud-item {
            margin-bottom: 10px;
            background: rgba(0, 20, 40, 0.8);
            padding: 8px 15px;
            border-left: 3px solid #0ff;
            backdrop-filter: blur(10px);
        }

        #health-bar {
            width: 200px;
            height: 20px;
            background: rgba(255, 0, 0, 0.2);
            border: 2px solid #f00;
            margin-top: 5px;
            position: relative;
            overflow: hidden;
        }

        #health-fill {
            height: 100%;
            background: linear-gradient(90deg, #f00 0%, #ff0 50%, #0f0 100%);
            width: 100%;
            transition: width 0.3s;
            box-shadow: 0 0 10px #0f0;
        }

        #game-over, #start-screen, #pause-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 100;
            background: rgba(0, 0, 0, 0.95);
            padding: 60px;
            border-radius: 20px;
            border: 3px solid #0ff;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.5),
                        inset 0 0 30px rgba(0, 100, 150, 0.3);
            display: none;
        }

        #start-screen {
            display: block;
        }

        h1 {
            font-family: 'Orbitron', monospace;
            font-size: 72px;
            font-weight: 900;
            color: #0ff;
            text-shadow: 0 0 20px #0ff, 0 0 40px #0ff, 0 0 60px #0ff;
            margin-bottom: 20px;
            letter-spacing: 8px;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 20px #0ff, 0 0 40px #0ff; }
            to { text-shadow: 0 0 30px #0ff, 0 0 60px #0ff, 0 0 80px #0ff; }
        }

        .subtitle {
            font-size: 24px;
            color: #fff;
            margin-bottom: 40px;
            opacity: 0.8;
        }

        button {
            font-family: 'Orbitron', monospace;
            font-size: 24px;
            padding: 15px 40px;
            background: linear-gradient(135deg, #0ff 0%, #00a 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            margin: 10px;
        }

        button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.8);
            background: linear-gradient(135deg, #00ffff 0%, #0066ff 100%);
        }

        button:active {
            transform: scale(0.95);
        }

        .score-display {
            font-size: 48px;
            color: #ff0;
            margin: 20px 0;
            text-shadow: 0 0 20px #ff0;
        }

        .instructions {
            text-align: left;
            margin-top: 30px;
            font-size: 18px;
            line-height: 2;
            color: #aaa;
        }

        .instructions div {
            margin: 10px 0;
        }

        .key {
            display: inline-block;
            background: rgba(0, 255, 255, 0.2);
            padding: 5px 12px;
            border-radius: 5px;
            border: 1px solid #0ff;
            font-weight: bold;
            color: #0ff;
            margin: 0 5px;
        }

        #combo {
            position: absolute;
            top: 100px;
            right: 20px;
            font-family: 'Orbitron', monospace;
            font-size: 36px;
            color: #ff0;
            text-shadow: 0 0 20px #ff0;
            display: none;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .enemy-info {
            position: absolute;
            top: 20px;
            right: 20px;
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            color: #0ff;
            text-align: right;
            background: rgba(0, 20, 40, 0.8);
            padding: 15px;
            border-right: 3px solid #0ff;
            backdrop-filter: blur(10px);
            max-width: 250px;
        }

        .enemy-type {
            margin: 8px 0;
            padding: 5px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
        }

        .enemy-type:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="stars"></div>
        
        <canvas id="game-canvas"></canvas>
        
        <div id="hud">
            <div class="hud-item">
                分数: <span id="score">0</span>
            </div>
            <div class="hud-item">
                关卡: <span id="level">1</span>
            </div>
            <div class="hud-item">
                生命值
                <div id="health-bar">
                    <div id="health-fill"></div>
                </div>
            </div>
            <div class="hud-item">
                火力: <span id="power-level">1</span> / 3
            </div>
        </div>

        <div class="enemy-info">
            <div style="margin-bottom: 10px; font-size: 16px; font-weight: bold;">敌人图鉴</div>
            <div class="enemy-type">🟢 编队机 - 5机编队</div>
            <div class="enemy-type">🔴 侦察机 - 快速移动</div>
            <div class="enemy-type">🔷 重型机 - 慢速坦克</div>
            <div class="enemy-type">⭐ 狙击机 - 精准射击</div>
            <div class="enemy-type">💠 轰炸机 - 散弹攻击</div>
            <div class="enemy-type">🔶 追击机 - 锁定玩家</div>
            <div class="enemy-type">👾 BOSS - 多重攻击</div>
        </div>

        <div id="combo"></div>

        <div id="start-screen">
            <h1>星际雷霆</h1>
            <div class="subtitle">SPACE THUNDER</div>
            <button onclick="startGame()">开始游戏</button>
            <div class="instructions">
                <div><span class="key">← →</span> 或 <span class="key">A D</span> 左右移动</div>
                <div><span class="key">↑ ↓</span> 或 <span class="key">W S</span> 上下移动</div>
                <div><span class="key">自动射击</span> 无需按键</div>
                <div><span class="key">P</span> 暂停游戏</div>
            </div>
        </div>

        <div id="pause-screen">
            <h1>游戏暂停</h1>
            <button onclick="resumeGame()">继续游戏</button>
            <button onclick="restartGame()">重新开始</button>
        </div>

        <div id="game-over">
            <h1>游戏结束</h1>
            <div class="score-display">
                最终分数: <span id="final-score">0</span>
            </div>
            <button onclick="restartGame()">重新开始</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        
        // 游戏配置
        const CANVAS_WIDTH = 800;
        const CANVAS_HEIGHT = 600;
        canvas.width = CANVAS_WIDTH;
        canvas.height = CANVAS_HEIGHT;

        // 游戏状态
        let gameRunning = false;
        let gamePaused = false;
        let score = 0;
        let level = 1;
        let combo = 0;
        let comboTimer = null;

        // 玩家
        const player = {
            x: CANVAS_WIDTH / 2,
            y: CANVAS_HEIGHT - 80,
            width: 40,
            height: 40,
            speed: 6,
            health: 100,
            maxHealth: 100,
            fireRate: 150, // 自动射击间隔
            lastFire: 0,
            powerLevel: 1
        };

        // 输入控制
        const keys = {};
        
        // 游戏对象数组
        let bullets = [];
        let enemies = [];
        let enemyBullets = [];
        let powerups = [];
        let particles = [];
        let formations = []; // 编队管理数组

        // 敌人生成
        let enemySpawnTimer = 0;
        const enemySpawnInterval = 1200;

        // 敌人类型配置
        const ENEMY_TYPES = {
            formation: {
                name: '编队机',
                health: 1,
                speed: 2,
                fireRate: 3500,
                score: 5,
                color: '#0f0',
                shape: 'formation',
                size: 10,
                bulletSpeed: 5,
                bulletPattern: 'single'
            },
            scout: {
                name: '侦察机',
                health: 2,
                speed: 4,
                fireRate: 2500,
                score: 10,
                color: '#f00',
                shape: 'circle',
                size: 15,
                bulletSpeed: 6,
                bulletPattern: 'single'
            },
            heavy: {
                name: '重型机',
                health: 15,
                speed: 1.5,
                fireRate: 2000,
                score: 30,
                color: '#00f',
                shape: 'square',
                size: 25,
                bulletSpeed: 4,
                bulletPattern: 'single'
            },
            sniper: {
                name: '狙击机',
                health: 5,
                speed: 2,
                fireRate: 3000,
                score: 40,
                color: '#ff0',
                shape: 'star',
                size: 20,
                bulletSpeed: 8,
                bulletPattern: 'aimed'
            },
            bomber: {
                name: '轰炸机',
                health: 8,
                speed: 2.5,
                fireRate: 1800,
                score: 50,
                color: '#0ff',
                shape: 'diamond',
                size: 22,
                bulletSpeed: 5,
                bulletPattern: 'spread'
            },
            tracker: {
                name: '追击机',
                health: 6,
                speed: 3,
                fireRate: 1500,
                score: 35,
                color: '#f80',
                shape: 'triangle',
                size: 18,
                bulletSpeed: 6,
                bulletPattern: 'tracking'
            },
            boss: {
                name: 'BOSS',
                health: 80,
                speed: 1,
                fireRate: 500,
                score: 500,
                color: '#f0f',
                shape: 'boss',
                size: 40,
                bulletSpeed: 5,
                bulletPattern: 'multi'
            }
        };

        // 初始化星空
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = star.style.height = Math.random() * 3 + 1 + 'px';
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }

        // 键盘事件
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            
            if (e.key === 'p' || e.key === 'P') {
                if (gameRunning && !gamePaused) {
                    pauseGame();
                }
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // 玩家类
        class Player {
            draw() {
                ctx.save();
                ctx.translate(player.x, player.y);
                
                // 引擎光芒
                const gradient = ctx.createLinearGradient(0, 20, 0, 40);
                gradient.addColorStop(0, 'rgba(0, 255, 255, 0.8)');
                gradient.addColorStop(1, 'rgba(0, 100, 255, 0)');
                ctx.fillStyle = gradient;
                ctx.fillRect(-8, 20, 16, 20);
                
                // 飞船
                ctx.fillStyle = '#0ff';
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                
                ctx.beginPath();
                ctx.moveTo(0, -20);
                ctx.lineTo(-15, 15);
                ctx.lineTo(-8, 15);
                ctx.lineTo(-8, 20);
                ctx.lineTo(8, 20);
                ctx.lineTo(8, 15);
                ctx.lineTo(15, 15);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                
                // 驾驶舱
                ctx.fillStyle = '#00f';
                ctx.beginPath();
                ctx.arc(0, 0, 5, 0, Math.PI * 2);
                ctx.fill();
                
                // 护盾效果（如果满血）
                if (player.health === player.maxHealth) {
                    ctx.strokeStyle = 'rgba(0, 255, 255, 0.3)';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(0, 0, 25, 0, Math.PI * 2);
                    ctx.stroke();
                }
                
                ctx.restore();
            }

            update() {
                // 移动控制 - 支持方向键和WASD
                if ((keys['ArrowLeft'] || keys['a'] || keys['A']) && player.x > player.width / 2) {
                    player.x -= player.speed;
                }
                if ((keys['ArrowRight'] || keys['d'] || keys['D']) && player.x < CANVAS_WIDTH - player.width / 2) {
                    player.x += player.speed;
                }
                if ((keys['ArrowUp'] || keys['w'] || keys['W']) && player.y > player.height / 2) {
                    player.y -= player.speed;
                }
                if ((keys['ArrowDown'] || keys['s'] || keys['S']) && player.y < CANVAS_HEIGHT - player.height / 2) {
                    player.y += player.speed;
                }

                // 自动发射子弹
                const now = Date.now();
                if (now - player.lastFire > player.fireRate) {
                    this.fire();
                    player.lastFire = now;
                }
            }

            fire() {
                if (player.powerLevel === 1) {
                    bullets.push(new Bullet(player.x, player.y - 20, 0, -12));
                } else if (player.powerLevel === 2) {
                    bullets.push(new Bullet(player.x - 12, player.y - 20, 0, -12));
                    bullets.push(new Bullet(player.x + 12, player.y - 20, 0, -12));
                } else {
                    bullets.push(new Bullet(player.x, player.y - 20, 0, -12));
                    bullets.push(new Bullet(player.x - 18, player.y - 15, -1.5, -12));
                    bullets.push(new Bullet(player.x + 18, player.y - 15, 1.5, -12));
                }
            }

            takeDamage(amount) {
                player.health -= amount;
                if (player.health <= 0) {
                    player.health = 0;
                    gameOver();
                }
                updateHealthBar();
            }
        }

        // 子弹类
        class Bullet {
            constructor(x, y, vx, vy, isEnemy = false) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.width = 4;
                this.height = 15;
                this.isEnemy = isEnemy;
            }

            draw() {
                const gradient = ctx.createLinearGradient(this.x, this.y, this.x, this.y + this.height);
                if (this.isEnemy) {
                    gradient.addColorStop(0, '#f00');
                    gradient.addColorStop(1, 'rgba(255, 0, 0, 0)');
                } else {
                    gradient.addColorStop(0, '#0ff');
                    gradient.addColorStop(1, 'rgba(0, 255, 255, 0)');
                }
                
                ctx.fillStyle = gradient;
                ctx.fillRect(this.x - this.width / 2, this.y, this.width, this.height);
                
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.isEnemy ? '#f00' : '#0ff';
                ctx.fillRect(this.x - this.width / 2, this.y, this.width, this.height);
                ctx.shadowBlur = 0;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
            }

            isOffScreen() {
                return this.y < -50 || this.y > CANVAS_HEIGHT + 50 || 
                       this.x < -50 || this.x > CANVAS_WIDTH + 50;
            }
        }

        // 敌人类
        class Enemy {
            constructor(type = 'scout', formationId = null, formationIndex = 0) {
                this.type = type;
                this.config = ENEMY_TYPES[type];
                this.formationId = formationId; // 编队ID
                this.formationIndex = formationIndex; // 编队中的位置
                this.x = Math.random() * (CANVAS_WIDTH - 60) + 30;
                this.y = -50;
                this.width = this.config.size * 2;
                this.height = this.config.size * 2;
                this.health = this.config.health;
                this.maxHealth = this.health;
                this.speed = this.config.speed;
                this.fireRate = this.config.fireRate;
                this.lastFire = Date.now() - this.fireRate; // 让敌人进入屏幕后可以立即开火
                this.angle = 0;
                this.movePattern = Math.random();
                this.moveTimer = 0;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                const size = this.config.size;
                ctx.fillStyle = this.config.color;
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;

                // 根据类型绘制不同形状
                switch(this.config.shape) {
                    case 'formation': // 编队小型机
                        ctx.beginPath();
                        ctx.moveTo(0, -size);
                        ctx.lineTo(-size * 0.6, size * 0.8);
                        ctx.lineTo(0, size * 0.5);
                        ctx.lineTo(size * 0.6, size * 0.8);
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                        
                        // 小型机标记
                        ctx.fillStyle = '#fff';
                        ctx.beginPath();
                        ctx.arc(0, 0, size * 0.3, 0, Math.PI * 2);
                        ctx.fill();
                        break;
                        
                    case 'circle': // 侦察机
                        ctx.beginPath();
                        ctx.arc(0, 0, size, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.stroke();
                        // 雷达天线
                        ctx.beginPath();
                        ctx.moveTo(0, -size);
                        ctx.lineTo(-5, -size - 8);
                        ctx.lineTo(5, -size - 8);
                        ctx.closePath();
                        ctx.fill();
                        break;
                        
                    case 'square': // 重型机
                        ctx.fillRect(-size, -size, size * 2, size * 2);
                        ctx.strokeRect(-size, -size, size * 2, size * 2);
                        // 装甲板
                        ctx.fillStyle = '#006';
                        ctx.fillRect(-size + 5, -size + 5, size * 2 - 10, size * 2 - 10);
                        break;
                        
                    case 'star': // 狙击机
                        ctx.rotate(this.angle);
                        ctx.beginPath();
                        for (let i = 0; i < 5; i++) {
                            const angle = (i * 4 * Math.PI) / 5;
                            const r = i % 2 === 0 ? size : size / 2;
                            ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
                        }
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                        break;
                        
                    case 'diamond': // 轰炸机
                        ctx.beginPath();
                        ctx.moveTo(0, -size);
                        ctx.lineTo(-size, 0);
                        ctx.lineTo(0, size);
                        ctx.lineTo(size, 0);
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                        // 炸弹舱
                        ctx.fillStyle = '#000';
                        ctx.fillRect(-8, -8, 16, 16);
                        break;
                        
                    case 'triangle': // 追击机
                        ctx.rotate(Math.PI);
                        ctx.beginPath();
                        ctx.moveTo(0, -size);
                        ctx.lineTo(-size, size);
                        ctx.lineTo(size, size);
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                        // 推进器
                        ctx.fillStyle = '#ff0';
                        ctx.fillRect(-10, size, 8, 10);
                        ctx.fillRect(2, size, 8, 10);
                        break;
                        
                    case 'boss': // BOSS
                        // 主体
                        ctx.fillRect(-size, -size, size * 2, size * 2);
                        ctx.strokeRect(-size, -size, size * 2, size * 2);
                        
                        // 核心
                        ctx.fillStyle = '#f00';
                        ctx.beginPath();
                        ctx.arc(0, 0, size / 2, 0, Math.PI * 2);
                        ctx.fill();
                        
                        // 炮塔
                        ctx.fillStyle = this.config.color;
                        ctx.fillRect(-size - 10, -10, 10, 20);
                        ctx.fillRect(size, -10, 10, 20);
                        ctx.fillRect(-10, -size - 10, 20, 10);
                        
                        // 旋转光环
                        ctx.save();
                        ctx.rotate(this.angle * 2);
                        ctx.strokeStyle = '#0ff';
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.arc(0, 0, size + 10, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.restore();
                        break;
                }

                ctx.restore();

                // 血条
                if (this.health < this.maxHealth) {
                    const barWidth = this.width;
                    const barHeight = 4;
                    const healthPercent = this.health / this.maxHealth;
                    
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    ctx.fillRect(this.x - barWidth / 2, this.y - this.height / 2 - 10, barWidth, barHeight);
                    
                    ctx.fillStyle = healthPercent > 0.5 ? '#0f0' : healthPercent > 0.25 ? '#ff0' : '#f00';
                    ctx.fillRect(this.x - barWidth / 2, this.y - this.height / 2 - 10, barWidth * healthPercent, barHeight);
                }
            }

            update() {
                this.angle += 0.05;
                this.moveTimer++;
                
                // 不同的移动模式
                if (this.type === 'formation') {
                    // 编队机 - 保持编队队形
                    const formation = formations.find(f => f.id === this.formationId);
                    if (formation) {
                        // V字编队：中间一架，两侧各两架
                        const offsetX = formation.offsetX;
                        const positions = [
                            { x: 0, y: 0 },           // 中心
                            { x: -30, y: 20 },        // 左前
                            { x: 30, y: 20 },         // 右前
                            { x: -60, y: 40 },        // 左后
                            { x: 60, y: 40 }          // 右后
                        ];
                        
                        const targetX = formation.centerX + positions[this.formationIndex].x;
                        const targetY = formation.baseY + positions[this.formationIndex].y;
                        
                        // 平滑移动到目标位置
                        this.x += (targetX - this.x) * 0.1;
                        this.y += (targetY - this.y) * 0.1;
                    } else {
                        // 如果编队丢失，正常下落
                        this.y += this.speed;
                    }
                } else if (this.type === 'tracker') {
                    // 追击机 - 跟随玩家
                    const dx = player.x - this.x;
                    const targetX = this.x + Math.sign(dx) * 2;
                    this.x += (targetX - this.x) * 0.1;
                } else if (this.type === 'boss') {
                    // BOSS - 横向移动
                    this.x += Math.sin(this.moveTimer * 0.02) * 2;
                } else {
                    // 其他敌人 - 波浪移动
                    if (this.movePattern < 0.5) {
                        this.x += Math.sin(this.y * 0.02) * 2;
                    } else {
                        this.x += Math.cos(this.moveTimer * 0.05) * 1.5;
                    }
                }
                
                this.y += this.speed;

                // 保持在屏幕内
                if (this.x < 30) this.x = 30;
                if (this.x > CANVAS_WIDTH - 30) this.x = CANVAS_WIDTH - 30;

                // 发射子弹
                const now = Date.now();
                if (now - this.lastFire > this.fireRate && this.y > 0) {
                    this.fire();
                    this.lastFire = now;
                }
            }

            fire() {
                const pattern = this.config.bulletPattern;
                const speed = this.config.bulletSpeed;
                
                switch(pattern) {
                    case 'single':
                        enemyBullets.push(new Bullet(this.x, this.y + 20, 0, speed, true));
                        break;
                        
                    case 'aimed': // 瞄准玩家
                        const dx = player.x - this.x;
                        const dy = player.y - this.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const vx = (dx / dist) * speed;
                        const vy = (dy / dist) * speed;
                        enemyBullets.push(new Bullet(this.x, this.y + 20, vx, vy, true));
                        break;
                        
                    case 'spread': // 散弹
                        for (let i = -1; i <= 1; i++) {
                            enemyBullets.push(new Bullet(this.x, this.y + 20, i * 2, speed, true));
                        }
                        break;
                        
                    case 'tracking': // 追踪弹
                        const dx2 = player.x - this.x;
                        const dy2 = player.y - this.y;
                        const dist2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);
                        const vx2 = (dx2 / dist2) * (speed - 1);
                        const vy2 = (dy2 / dist2) * (speed - 1);
                        enemyBullets.push(new Bullet(this.x, this.y + 20, vx2, vy2, true));
                        break;
                        
                    case 'multi': // BOSS多重射击
                        // 直射
                        enemyBullets.push(new Bullet(this.x, this.y + 30, 0, speed, true));
                        // 斜射
                        enemyBullets.push(new Bullet(this.x - 20, this.y + 30, -2, speed, true));
                        enemyBullets.push(new Bullet(this.x + 20, this.y + 30, 2, speed, true));
                        // 瞄准玩家
                        const dx3 = player.x - this.x;
                        const dy3 = player.y - this.y;
                        const dist3 = Math.sqrt(dx3 * dx3 + dy3 * dy3);
                        const vx3 = (dx3 / dist3) * speed;
                        const vy3 = (dy3 / dist3) * speed;
                        enemyBullets.push(new Bullet(this.x, this.y + 30, vx3, vy3, true));
                        break;
                }
            }

            takeDamage(amount) {
                this.health -= amount;
                if (this.health <= 0) {
                    createExplosion(this.x, this.y, this.config.color);
                    updateScore(this.config.score);
                    
                    // 如果是编队机，更新编队状态
                    if (this.type === 'formation' && this.formationId) {
                        const formation = formations.find(f => f.id === this.formationId);
                        if (formation) {
                            formation.destroyed++;
                            formation.alive--;
                            
                            // 如果整个编队被击毁，奖励回血道具
                            if (formation.destroyed === 5) {
                                powerups.push(new Powerup(this.x, this.y, 'health'));
                                // 额外奖励分数
                                updateScore(50);
                                // 显示特殊提示
                                showFormationBonus(this.x, this.y);
                            }
                        }
                    } else {
                        // 其他敌人正常掉落道具
                        const dropChance = this.type === 'boss' ? 0.8 : this.type === 'heavy' ? 0.3 : 0.15;
                        if (Math.random() < dropChance) {
                            powerups.push(new Powerup(this.x, this.y));
                        }
                    }
                    
                    return true;
                }
                return false;
            }

            isOffScreen() {
                return this.y > CANVAS_HEIGHT + 50;
            }
        }

        // 道具类
        class Powerup {
            constructor(x, y, forceType = null) {
                this.x = x;
                this.y = y;
                this.width = 30;
                this.height = 30;
                this.type = forceType || (Math.random() < 0.6 ? 'weapon' : 'health');
                this.angle = 0;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                if (this.type === 'weapon') {
                    ctx.fillStyle = '#ff0';
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    
                    ctx.beginPath();
                    ctx.moveTo(0, -15);
                    ctx.lineTo(-15, 0);
                    ctx.lineTo(0, 15);
                    ctx.lineTo(15, 0);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                    
                    // 内部标记
                    ctx.fillStyle = '#000';
                    ctx.font = 'bold 14px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('W', 0, 0);
                } else {
                    ctx.fillStyle = '#0f0';
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    
                    ctx.fillRect(-12, -3, 24, 6);
                    ctx.fillRect(-3, -12, 6, 24);
                    ctx.strokeRect(-12, -3, 24, 6);
                    ctx.strokeRect(-3, -12, 6, 24);
                }

                ctx.restore();
            }

            update() {
                this.y += 2;
                this.angle += 0.1;
            }

            isOffScreen() {
                return this.y > CANVAS_HEIGHT + 50;
            }
        }

        // 粒子类
        class Particle {
            constructor(x, y, vx, vy, color, life) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.life = life;
                this.maxLife = life;
                this.size = Math.random() * 4 + 2;
            }

            draw() {
                const alpha = this.life / this.maxLife;
                ctx.fillStyle = this.color.replace(')', `, ${alpha})`).replace('rgb', 'rgba');
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2; // 重力
                this.life--;
            }
        }

        // 创建爆炸效果
        function createExplosion(x, y, color = '#f00') {
            // 转换颜色为RGB
            let r, g, b;
            if (color === '#f00') { r = 255; g = 0; b = 0; }
            else if (color === '#00f') { r = 0; g = 0; b = 255; }
            else if (color === '#ff0') { r = 255; g = 255; b = 0; }
            else if (color === '#0ff') { r = 0; g = 255; b = 255; }
            else if (color === '#f80') { r = 255; g = 128; b = 0; }
            else if (color === '#f0f') { r = 255; g = 0; b = 255; }
            else if (color === '#0f0') { r = 0; g = 255; b = 0; }
            else { r = 255; g = 100; b = 0; }
            
            for (let i = 0; i < 40; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 6 + 2;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed;
                const particleColor = `rgb(${r + Math.random() * 50}, ${g}, ${b})`;
                particles.push(new Particle(x, y, vx, vy, particleColor, 60));
            }
        }

        // 显示编队击毁奖励提示
        function showFormationBonus(x, y) {
            // 创建特殊的金色粒子效果
            for (let i = 0; i < 60; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 3;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed;
                const colors = ['rgb(255, 215, 0)', 'rgb(255, 255, 0)', 'rgb(255, 165, 0)'];
                const color = colors[Math.floor(Math.random() * colors.length)];
                particles.push(new Particle(x, y, vx, vy, color, 80));
            }
        }

        // 碰撞检测
        function checkCollision(obj1, obj2) {
            return obj1.x < obj2.x + obj2.width &&
                   obj1.x + obj1.width > obj2.x &&
                   obj1.y < obj2.y + obj2.height &&
                   obj1.y + obj1.height > obj2.y;
        }

        // 更新分数
        function updateScore(points) {
            score += points * (1 + combo * 0.1);
            combo++;
            document.getElementById('score').textContent = Math.floor(score);
            
            // 显示连击
            if (combo > 1) {
                const comboEl = document.getElementById('combo');
                comboEl.textContent = `COMBO x${combo}!`;
                comboEl.style.display = 'block';
                
                clearTimeout(comboTimer);
                comboTimer = setTimeout(() => {
                    comboEl.style.display = 'none';
                    combo = 0;
                }, 2000);
            }

            // 升级
            const newLevel = Math.floor(score / 1000) + 1;
            if (newLevel > level) {
                level = newLevel;
                document.getElementById('level').textContent = level;
            }
        }

        // 更新生命值显示
        function updateHealthBar() {
            const healthPercent = (player.health / player.maxHealth) * 100;
            document.getElementById('health-fill').style.width = healthPercent + '%';
        }

        // 更新火力等级显示
        function updatePowerLevel() {
            document.getElementById('power-level').textContent = player.powerLevel;
        }

        // 生成编队
        function spawnFormation() {
            const formationId = 'formation_' + Date.now();
            const centerX = Math.random() * (CANVAS_WIDTH - 200) + 100;
            const baseY = -100;
            
            const formation = {
                id: formationId,
                centerX: centerX,
                baseY: baseY,
                offsetX: 0,
                speed: 2,
                alive: 5, // 存活的飞机数量
                destroyed: 0 // 已击毁数量
            };
            
            formations.push(formation);
            
            // 创建5架编队机
            for (let i = 0; i < 5; i++) {
                const enemy = new Enemy('formation', formationId, i);
                enemy.x = centerX;
                enemy.y = baseY;
                enemies.push(enemy);
            }
        }

        // 生成敌人
        function spawnEnemy() {
            const rand = Math.random();
            let type = 'scout'; // 默认类型
            
            // 根据关卡和随机数决定敌人类型
            if (rand < 0.15) {
                // 15%概率生成编队
                spawnFormation();
                return;
            } else if (level >= 4 && rand < 0.23) {
                type = 'boss'; // 4级后 8% BOSS
            } else if (level >= 3 && rand < 0.40) {
                type = 'tracker'; // 3级后 17% 追击机
            } else if (level >= 2 && rand < 0.60) {
                type = 'bomber'; // 2级后 20% 轰炸机
            } else if (level >= 2 && rand < 0.80) {
                type = 'sniper'; // 2级后 20% 狙击机
            } else if (level >= 1 && rand < 0.95) {
                type = 'heavy'; // 1级就有 15% 重型机
            } else {
                type = 'scout'; // 5% 侦察机
            }
            
            enemies.push(new Enemy(type));
        }

        // 游戏主循环
        function gameLoop(timestamp) {
            if (!gameRunning || gamePaused) return;

            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // 更新和绘制玩家
            const playerObj = new Player();
            playerObj.update();
            playerObj.draw();

            // 更新和绘制子弹
            bullets = bullets.filter(bullet => {
                bullet.update();
                bullet.draw();
                return !bullet.isOffScreen();
            });

            // 更新和绘制敌人子弹
            enemyBullets = enemyBullets.filter(bullet => {
                bullet.update();
                bullet.draw();
                
                // 检测与玩家的碰撞
                if (checkCollision({x: bullet.x - 2, y: bullet.y, width: 4, height: 15}, 
                                  {x: player.x - 20, y: player.y - 20, width: 40, height: 40})) {
                    playerObj.takeDamage(8);
                    createExplosion(bullet.x, bullet.y, '#f00');
                    return false;
                }
                
                return !bullet.isOffScreen();
            });

            // 生成敌人
            enemySpawnTimer += 16;
            const spawnRate = Math.max(500, enemySpawnInterval - level * 100);
            if (enemySpawnTimer > spawnRate) {
                spawnEnemy();
                enemySpawnTimer = 0;
            }

            // 更新编队
            formations = formations.filter(formation => {
                formation.baseY += formation.speed;
                formation.offsetX = Math.sin(formation.baseY * 0.01) * 50;
                formation.centerX += formation.offsetX * 0.05;
                
                // 保持在屏幕内
                if (formation.centerX < 100) formation.centerX = 100;
                if (formation.centerX > CANVAS_WIDTH - 100) formation.centerX = CANVAS_WIDTH - 100;
                
                // 如果编队超出屏幕或全部被击毁，移除编队
                return formation.baseY < CANVAS_HEIGHT + 100 && formation.alive > 0;
            });

            // 更新和绘制敌人
            enemies = enemies.filter(enemy => {
                enemy.update();
                enemy.draw();

                // 检测子弹碰撞
                bullets = bullets.filter(bullet => {
                    if (checkCollision({x: bullet.x - 2, y: bullet.y, width: 4, height: 15}, 
                                      {x: enemy.x - enemy.width/2, y: enemy.y - enemy.height/2, 
                                       width: enemy.width, height: enemy.height})) {
                        if (enemy.takeDamage(1)) {
                            return false;
                        }
                        return false;
                    }
                    return true;
                });

                // 检测与玩家的碰撞
                if (checkCollision({x: enemy.x - enemy.width/2, y: enemy.y - enemy.height/2, 
                                   width: enemy.width, height: enemy.height},
                                  {x: player.x - 20, y: player.y - 20, width: 40, height: 40})) {
                    playerObj.takeDamage(25);
                    createExplosion(enemy.x, enemy.y, enemy.config.color);
                    return false;
                }

                return !enemy.isOffScreen() && enemy.health > 0;
            });

            // 更新和绘制道具
            powerups = powerups.filter(powerup => {
                powerup.update();
                powerup.draw();

                // 检测与玩家的碰撞
                if (checkCollision({x: powerup.x - 15, y: powerup.y - 15, width: 30, height: 30},
                                  {x: player.x - 20, y: player.y - 20, width: 40, height: 40})) {
                    if (powerup.type === 'weapon') {
                        player.powerLevel = Math.min(player.powerLevel + 1, 3);
                        updatePowerLevel();
                    } else {
                        player.health = Math.min(player.health + 30, player.maxHealth);
                        updateHealthBar();
                    }
                    createExplosion(powerup.x, powerup.y, powerup.type === 'weapon' ? '#ff0' : '#0f0');
                    return false;
                }

                return !powerup.isOffScreen();
            });

            // 更新和绘制粒子
            particles = particles.filter(particle => {
                particle.update();
                particle.draw();
                return particle.life > 0;
            });

            requestAnimationFrame(gameLoop);
        }

        // 开始游戏
        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            gameRunning = true;
            gamePaused = false;
            resetGame();
            requestAnimationFrame(gameLoop);
        }

        // 暂停游戏
        function pauseGame() {
            gamePaused = true;
            document.getElementById('pause-screen').style.display = 'block';
        }

        // 恢复游戏
        function resumeGame() {
            gamePaused = false;
            document.getElementById('pause-screen').style.display = 'none';
            requestAnimationFrame(gameLoop);
        }

        // 重置游戏
        function resetGame() {
            score = 0;
            level = 1;
            combo = 0;
            player.x = CANVAS_WIDTH / 2;
            player.y = CANVAS_HEIGHT - 80;
            player.health = player.maxHealth;
            player.powerLevel = 1;
            bullets = [];
            enemies = [];
            enemyBullets = [];
            powerups = [];
            particles = [];
            formations = [];
            enemySpawnTimer = 0;
            
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            updateHealthBar();
            updatePowerLevel();
        }

        // 重新开始游戏
        function restartGame() {
            document.getElementById('game-over').style.display = 'none';
            document.getElementById('pause-screen').style.display = 'none';
            gameRunning = true;
            gamePaused = false;
            resetGame();
            requestAnimationFrame(gameLoop);
        }

        // 游戏结束
        function gameOver() {
            gameRunning = false;
            document.getElementById('final-score').textContent = Math.floor(score);
            document.getElementById('game-over').style.display = 'block';
        }

        // 初始化
        createStars();
    </script>
</body>
</html>
