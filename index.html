<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>认知训练卡片制作 v7</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
:root{
  --cream:#FAF7F2;--warm:#F0EBE1;--border:#DDD5C8;--text:#2C2416;--muted:#8A7F72;
  --accent:#7A5C3E;--accent-l:#C4A882;--accent-bg:#F5EFE8;
  --green:#4A7C59;--green-l:#EAF3EE;
  --red:#9B3A2A;--red-l:#FAEAE7;
  --blue:#2D5F8A;--blue-l:#E8F1F8;
  --sh:0 1px 4px rgba(44,36,22,.07),0 4px 16px rgba(44,36,22,.06);
  --sh2:0 2px 8px rgba(44,36,22,.1),0 8px 24px rgba(44,36,22,.1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:var(--cream);color:var(--text);min-height:100vh}

/* ── 页头 ── */
.app-header{background:var(--accent);color:#FAF7F2;padding:15px 20px;display:flex;align-items:center;gap:12px}
.app-header-title{font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;font-size:18px;font-weight:700;letter-spacing:.5px}
.app-header-sub{font-size:11px;opacity:.6;margin-top:2px}

/* ── 步骤条 ── */
.steps{display:flex;background:#fff;border-bottom:1px solid var(--border)}
.step{flex:1;padding:10px 4px;text-align:center;font-size:11px;color:var(--muted);cursor:pointer;position:relative}
.step+.step{border-left:1px solid var(--border)}
.step.active{color:var(--accent);font-weight:600}
.step.active::after{content:'';position:absolute;bottom:0;left:15%;right:15%;height:2px;background:var(--accent);border-radius:2px}
.step.done{color:var(--green)}
.step .sn{display:block;font-size:15px;font-weight:700;margin-bottom:1px}

/* ── 主容器 ── */
.main{max-width:640px;margin:0 auto;padding:20px 16px 100px}
.panel{display:none}.panel.active{display:block}

/* ════════════════════════════
STEP 0：选择模式
════════════════════════════ */
.mode-wrap{display:flex;flex-direction:column;gap:14px;margin-bottom:28px}
.mode-card{background:#fff;border:2px solid var(--border);border-radius:14px;padding:18px;cursor:pointer;transition:border-color .15s,background .15s}
.mode-card.sel{border-color:var(--accent);background:var(--accent-bg)}
.mode-card.off{opacity:.45;pointer-events:none}
.mc-hd{display:flex;align-items:center;gap:10px;margin-bottom:13px}
.mc-ico{width:34px;height:34px;border-radius:9px;background:var(--warm);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.mode-card.sel .mc-ico{background:var(--accent-l)}
.mc-ttl{font-size:15px;font-weight:600;font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif}
.mc-sub{font-size:12px;color:var(--muted);margin-top:1px}
.f-label{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:5px}
.f-input{border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:15px;font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:var(--cream);color:var(--text);width:100%;transition:.15s}
.f-input:focus{outline:none;border-color:var(--accent);background:#fff}
.imp-btn{display:flex;align-items:center;gap:8px;padding:10px 13px;border:1.5px solid var(--border);border-radius:8px;background:var(--cream);color:var(--text);font-size:13px;cursor:pointer;font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;position:relative;overflow:hidden;width:100%;transition:.15s}
.imp-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;font-size:16px}
.imp-btn.ok{border-color:var(--green);background:var(--green-l);color:var(--green);font-weight:500}
.imp-st{font-size:12px;color:var(--muted);margin-top:6px;min-height:18px}
.imp-st.ok{color:var(--green)}
.imp-st.err{color:var(--red)}

/* ════════════════════════════
STEP 1：编辑卡片
════════════════════════════ */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.deck-tag{background:#fff;border:1px solid var(--border);border-radius:20px;padding:5px 13px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px}
.deck-tag b{color:var(--text);font-weight:600}
.q-ctl{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.q-ctl input[type=range]{width:64px;accent-color:var(--accent)}
.q-ctl b{min-width:34px;color:var(--accent);font-weight:600}

#card-list{display:flex;flex-direction:column;gap:8px}

/* ── 卡片容器 ── */
.ci{background:#fff;border:1.5px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--sh);transition:border-color .2s,box-shadow .2s}
.ci.editing{border-color:var(--accent);box-shadow:var(--sh2)}

/* ── 折叠行 ── */
.crow{display:grid;grid-template-columns:26px 1fr 48px 48px 48px;gap:6px;align-items:center;padding:11px 12px;min-height:56px}
.cidx{width:24px;height:24px;border-radius:50%;background:var(--warm);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);flex-shrink:0}
.ci.editing .cidx{background:var(--accent);border-color:var(--accent);color:#fff}
.cname{font-size:15px;font-weight:600;font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cname.empty{color:var(--muted);font-style:italic;font-weight:400;font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;font-size:13px}

/* 缩略图：无图片时纯色方块，无图标 */
.cthumb{width:44px;height:44px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--warm);border:1px solid var(--border)}
.cthumb img{width:100%;height:100%;object-fit:cover;display:block}
.cthumb.empty{background:var(--warm)}

/* 文字操作按钮 */
.ca{padding:5px 2px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;border-radius:6px;color:var(--blue);text-align:center}
.ca.del{color:var(--red)}
.ca:disabled{color:var(--muted);cursor:default}

/* ── 展开编辑区 ── */
.cedit{display:none;border-top:1px solid var(--border);background:var(--accent-bg);padding:14px 12px 0}
.ci.editing .cedit{display:block}

.es{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.elabel{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.4px;text-transform:uppercase}
.ename{border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:16px;font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;font-weight:600;background:#fff;
