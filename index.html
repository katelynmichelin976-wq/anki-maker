<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>认知训练卡片制作</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Noto+Sans+SC:wght@300;400;500&display=swap');
:root{
  --bg:#F7F4EF;--surface:#FFFFFF;--border:#E0D8CC;--text:#1E1A14;--muted:#9A8F82;
  --accent:#5B7FA6;--accent-l:#EBF2F9;--accent-d:#3D6490;
  --green:#4A7C59;--green-l:#EBF4EE;--red:#B83B2A;--red-l:#FAF0EE;
  --active-border:#5B7FA6;--active-bg:#F4F8FC;
  --sh:0 1px 4px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.05);
  --sh2:0 2px 8px rgba(0,0,0,.1),0 8px 24px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── 页头 ── */
.header{background:var(–text);color:#F7F4EF;padding:16px 20px;display:flex;align-items:center;gap:12px}
.header-title{font-family:‘Noto Serif SC’,serif;font-size:17px;font-weight:700;letter-spacing:.5px}
.header-sub{font-size:11px;opacity:.55;margin-top:2px}

/* ── 步骤条 ── */
.steps{display:flex;background:var(–surface);border-bottom:1px solid var(–border)}
.step{flex:1;padding:11px 4px;text-align:center;font-size:11px;color:var(–muted);cursor:pointer;position:relative;transition:.15s}
.step+.step::before{content:’’;position:absolute;left:0;top:20%;height:60%;width:1px;background:var(–border)}
.step.active{color:var(–accent);font-weight:600}
.step.active::after{content:’’;position:absolute;bottom:0;left:10%;right:10%;height:2px;background:var(–accent);border-radius:2px}
.step .sn{display:block;font-size:15px;font-weight:700;margin-bottom:1px}
.step.done .sn{color:var(–green)}

/* ── 主内容 ── */
.main{max-width:640px;margin:0 auto;padding:20px 16px 100px}

/* ── Panel ── */
.panel{display:none}.panel.active{display:block}

/* ═══════════════════════════════
STEP 0：新建 / 导入
═══════════════════════════════ */
.mode-cards{display:flex;flex-direction:column;gap:14px;margin-bottom:28px}
.mode-card{background:var(–surface);border:2px solid var(–border);border-radius:14px;padding:20px;cursor:pointer;transition:.15s}
.mode-card.selected{border-color:var(–accent);background:var(–accent-l)}
.mode-card-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.mode-icon{width:36px;height:36px;border-radius:10px;background:var(–bg);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.mode-card.selected .mode-icon{background:var(–accent);filter:none}
.mode-title{font-size:15px;font-weight:600}
.mode-desc{font-size:12px;color:var(–muted)}
.field-row{display:flex;flex-direction:column;gap:6px}
.field-label{font-size:12px;color:var(–muted);font-weight:500}
.field-input{border:1.5px solid var(–border);border-radius:8px;padding:10px 13px;font-size:15px;font-family:‘Noto Sans SC’,sans-serif;background:var(–bg);color:var(–text);width:100%;transition:.15s}
.field-input:focus{outline:none;border-color:var(–accent);background:#fff}
.import-btn{display:flex;align-items:center;gap:8px;padding:10px 14px;border:1.5px solid var(–border);border-radius:8px;background:var(–bg);color:var(–text);font-size:13px;cursor:pointer;font-family:‘Noto Sans SC’,sans-serif;position:relative;overflow:hidden;width:100%}
.import-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;font-size:16px}
.import-btn.ok{border-color:var(–green);background:var(–green-l);color:var(–green)}
.import-status{font-size:12px;color:var(–muted);margin-top:6px}
.import-status.ok{color:var(–green)}
.mode-card.disabled{opacity:.4;pointer-events:none}

/* ═══════════════════════════════
STEP 1：编辑卡片
═══════════════════════════════ */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.deck-name-tag{background:var(–surface);border:1px solid var(–border);border-radius:20px;padding:5px 12px;font-size:12px;color:var(–muted);display:flex;align-items:center;gap:5px}
.deck-name-tag strong{color:var(–text)}
.compress-ctl{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;color:var(–muted)}
.compress-ctl input[type=range]{width:64px;accent-color:var(–accent)}
.compress-ctl label{min-width:32px;font-weight:600;color:var(–accent)}

#card-list{display:flex;flex-direction:column;gap:8px}

/* ── 卡片（折叠） ── */
.card-item{background:var(–surface);border:1.5px solid var(–border);border-radius:12px;overflow:hidden;box-shadow:var(–sh);transition:border-color .15s,box-shadow .15s}
.card-item.editing{border-color:var(–active-border);box-shadow:var(–sh2)}

.card-row{display:grid;grid-template-columns:28px 1fr auto 52px 52px;gap:8px;align-items:center;padding:11px 12px;min-height:58px}
.card-idx{width:24px;height:24px;border-radius:50%;background:var(–bg);border:1px solid var(–border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(–muted);flex-shrink:0}
.card-item.editing .card-idx{background:var(–accent);border-color:var(–accent);color:#fff}
.card-name{font-size:15px;font-weight:600;font-family:‘Noto Serif SC’,serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(–text)}
.card-name.empty{color:var(–muted);font-weight:400;font-style:italic;font-family:‘Noto Sans SC’,sans-serif}
.card-thumb{width:44px;height:44px;border-radius:8px;object-fit:cover;border:1px solid var(–border);background:var(–bg);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;overflow:hidden}
.card-thumb img{width:100%;height:100%;object-fit:cover}

/* 编辑/删除 文字按钮 */
.card-act{display:flex;align-items:center;justify-content:center;padding:6px 4px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;font-family:‘Noto Sans SC’,sans-serif;border-radius:6px;width:100%}
.card-act.edit{color:var(–accent)}
.card-act.edit.done{color:var(–green)}
.card-act.del{color:var(–red)}

/* ── 卡片（展开编辑区） ── */
.card-edit{display:none;border-top:1px solid var(–border);background:var(–active-bg);padding:14px 12px;display:flex;flex-direction:column;gap:14px}
.card-item:not(.editing) .card-edit{display:none}
.card-item.editing .card-edit{display:flex}

.edit-section{display:flex;flex-direction:column;gap:6px}
.edit-label{font-size:11px;font-weight:600;color:var(–muted);text-transform:uppercase;letter-spacing:.5px}
.edit-name-input{border:1.5px solid var(–border);border-radius:8px;padding:10px 13px;font-size:16px;font-family:‘Noto Serif SC’,serif;font-weight:600;background:#fff;color:var(–text);width:100%}
.edit-name-input:focus{outline:none;border-color:var(–accent)}

/* 图片编辑区 */
.img-edit-row{display:flex;align-items:center;gap:12px}
.img-preview{width:80px;height:80px;border-radius:10px;border:1.5px solid var(–border);background:var(–bg);display:flex;align-items:center;justify-content:center;font-size:28px;overflow:hidden;flex-shrink:0}
.img-preview img{width:100%;height:100%;object-fit:cover}
.img-replace-btn{flex:1;padding:10px;border:1.5px dashed var(–border);border-radius:8px;background:#fff;color:var(–accent);font-size:13px;font-weight:500;cursor:pointer;font-family:‘Noto Sans SC’,sans-serif;position:relative;overflow:hidden;text-align:center}
.img-replace-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:16px}
.img-replace-btn.ok{border-style:solid;border-color:var(–green);color:var(–green)}
.img-size{font-size:10px;color:var(–muted);margin-top:3px;text-align:center}

/* 录音区 */
.rec-area{background:#fff;border:1.5px solid var(–border);border-radius:10px;padding:12px}
.rec-area.ok{border-color:var(–green);background:var(–green-l)}
.rec-btn{display:flex;align-items:center;gap:7px;padding:10px 18px;border:none;border-radius:8px;background:var(–accent);color:#fff;font-size:14px;font-weight:500;cursor:pointer;font-family:‘Noto Sans SC’,sans-serif;transition:.15s}
.rec-btn.recording{background:var(–red);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.6}}
.rec-status{font-size:12px;color:var(–muted);margin-top:8px}
.rec-status.ok{color:var(–green);font-weight:500}
.rec-player{margin-top:8px;display:none}
.rec-player audio{width:100%;height:36px}

.add-card-btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:13px;border:2px dashed var(–border);border-radius:12px;background:transparent;color:var(–muted);font-size:14px;cursor:pointer;font-family:‘Noto Sans SC’,sans-serif;margin-top:4px}
.add-card-btn:active{background:var(–surface)}

/* ═══════════════════════════════
STEP 2：预览
═══════════════════════════════ */
.preview-meta{background:var(–surface);border:1px solid var(–border);border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;gap:16px;flex-wrap:wrap}
.meta-item{display:flex;flex-direction:column;gap:2px}
.meta-label{font-size:10px;color:var(–muted);font-weight:500}
.meta-value{font-size:14px;font-weight:600;color:var(–text)}
.preview-list{display:flex;flex-direction:column;gap:8px}
.preview-item{background:var(–surface);border:1px solid var(–border);border-radius:10px;padding:12px 14px;display:flex;gap:12px;align-items:center}
.preview-thumb{width:52px;height:52px;border-radius:8px;object-fit:cover;border:1px solid var(–border);flex-shrink:0;background:var(–bg);display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden}
.preview-thumb img{width:100%;height:100%;object-fit:cover}
.preview-info{flex:1;min-width:0}
.preview-name{font-size:16px;font-weight:700;font-family:‘Noto Serif SC’,serif;margin-bottom:4px}
.preview-tags{display:flex;gap:6px;flex-wrap:wrap}
.ptag{font-size:11px;padding:2px 8px;border-radius:10px;background:var(–bg);border:1px solid var(–border);color:var(–muted)}
.ptag.ok{background:var(–green-l);border-color:#a8cdb5;color:var(–green)}
.preview-check{font-size:18px;flex-shrink:0}

/* ═══════════════════════════════
STEP 3：结果
═══════════════════════════════ */
.result-card{background:var(–surface);border:1px solid var(–border);border-radius:14px;padding:32px 24px;text-align:center;box-shadow:var(–sh)}
.result-icon{font-size:48px;margin-bottom:12px}
.result-title{font-family:‘Noto Serif SC’,serif;font-size:21px;font-weight:700;margin-bottom:8px}
.result-detail{font-size:13px;color:var(–muted);line-height:2;margin-bottom:20px}
.result-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.how-to{background:var(–bg);border-radius:10px;padding:14px 16px;text-align:left;font-size:12px;color:var(–muted);line-height:2.2}
.how-to strong{color:var(–text)}

/* ═══════════════════════════════
공통 버튼
═══════════════════════════════ */
.btn{padding:12px 22px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;border:none;font-family:‘Noto Sans SC’,sans-serif;display:inline-flex;align-items:center;gap:6px;transition:.15s}
.btn-primary{background:var(–accent);color:#fff}
.btn-primary:disabled{background:#C5CBD3;cursor:not-allowed}
.btn-green{background:var(–green);color:#fff}
.btn-green:disabled{background:#C5CBD3;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(–accent);border:1.5px solid var(–accent);padding:11px 20px}
.btn-sec{background:var(–surface);color:var(–text);border:1.5px solid var(–border)}

.bottom-bar{display:flex;align-items:center;gap:10px;margin-top:22px}
.spacer{flex:1}

/* ── 에러 박스 ── */
.err{background:var(–red-l);border:1px solid #e0a090;border-radius:8px;padding:10px 14px;font-size:13px;color:var(–red);display:none;margin-top:10px}
.err.show{display:block}
</style>

</head>

<script>
// ═══════════════════════════════════════════════════════
// 状态
// ═══════════════════════════════════════════════════════
let mode = null;          // 'new' | 'import'
let deckName = '';
let cards = [];
let apkgBlob = null;
let activeRecId = null;   // 当前录音的卡片id
let mediaRecorder = null;
let currentEditId = null; // 当前展开编辑的卡片id

// ═══════════════════════════════════════════════════════
// 工具函数
// ═══════════════════════════════════════════════════════
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtKB(kb){return kb>=1024?(kb/1024).toFixed(1)+'MB':kb+'KB';}
function getQ(){return parseInt(document.getElementById('q-slider').value)/100;}
function updateQ(v){document.getElementById('q-label').textContent=v+'%';}
function loadScript(src){
  return new Promise((res,rej)=>{
    if(document.querySelector(`script[src="${src}"]`)){res();return;}
    const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);
  });
}

// ═══════════════════════════════════════════════════════
// 步骤导航
// ═══════════════════════════════════════════════════════
function goStep(n){
  if(n===2) renderPreview();
  document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('active',i===n));
  document.querySelectorAll('.step').forEach((s,i)=>{
    s.classList.toggle('active',i===n);
    s.classList.toggle('done',i<n);
  });
  window.scrollTo(0,0);
}

// ═══════════════════════════════════════════════════════
// STEP 0：模式选择
// ═══════════════════════════════════════════════════════
function selectMode(m){
  mode=m;
  document.getElementById('mc-new').classList.toggle('selected',m==='new');
  document.getElementById('mc-import').classList.toggle('selected',m==='import');
  document.getElementById('mc-new').classList.toggle('disabled',m==='import');
  document.getElementById('mc-import').classList.toggle('disabled',m==='new');
  // 取消互斥：允许切换
  document.getElementById('mc-new').classList.remove('disabled');
  document.getElementById('mc-import').classList.remove('disabled');
  updateStep0Btn();
}

function updateStep0Btn(){
  const nameOk = mode==='new' && document.getElementById('deck-name-input').value.trim().length>0;
  const importOk = mode==='import' && cards.length>0;
  document.getElementById('btn-step0').disabled = !(nameOk||importOk);
  if(mode==='new'&&document.getElementById('deck-name-input').value.trim()){
    deckName=document.getElementById('deck-name-input').value.trim();
  }
}

// ── 导入 .apkg ─────────────────────────────────────────
async function handleImport(e){
  const file=e.target.files[0];if(!file)return;
  const statusEl=document.getElementById('import-status');
  const btnEl=document.getElementById('import-btn');
  statusEl.textContent='解析中…';statusEl.className='import-status';

  try{
    if(!window.JSZip) await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');
    if(!window.SQL){
      await loadScript('https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.min.js');
      window.SQL=await initSqlJs({locateFile:f=>'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/'+f});
    }

    const zip=await JSZip.loadAsync(await file.arrayBuffer());

    // 读 media 索引
    const mediaJson=await zip.file('media').async('string');
    const mediaIndex=JSON.parse(mediaJson); // {"0":"img_0.jpg","1":"snd_0.m4a",...}
    // 反转：文件名 → zip内编号
    const nameToIdx={};
    Object.entries(mediaIndex).forEach(([idx,name])=>nameToIdx[name]=idx);

    // 读 SQLite
    const dbBuf=await zip.file('collection.anki2').async('arraybuffer');
    const db=new SQL.Database(new Uint8Array(dbBuf));

    // 读牌组名
    const colRes=db.exec('SELECT decks FROM col LIMIT 1');
    if(colRes.length){
      const decksObj=JSON.parse(colRes[0].values[0][0]);
      const deckEntries=Object.values(decksObj).filter(d=>d.id!==1&&d.name!=='Default');
      if(deckEntries.length) deckName=deckEntries[0].name;
      else deckName=file.name.replace('.apkg','');
    }

    // 读 notes：flds 字段用 \x1f 分隔
    // 字段顺序：Front | Name | Audio（v3格式）
    // 兼容旧格式：Front | Name | Back
    const notesRes=db.exec('SELECT flds FROM notes');
    const SEP='\x1f';
    const imported=[];

    for(const row of notesRes[0]?.values||[]){
      const flds=row[0].split(SEP);
      const frontHtml=flds[0]||'';
      const nameVal=flds[1]||'';
      const audioField=flds[2]||'';

      if(!nameVal.trim()) continue; // 跳过无名称

      const card={
        id:Date.now()+Math.random(),
        name:nameVal.trim(),
        imageDataUrl:null,imageBlob:null,imageSizeKB:null,origKB:null,
        audioBlob:null,audioName:null,audioDataUrl:null,audioExt:'m4a',
        _img:null,_snd:null
      };

      // 提取图片文件名（Front字段里的 <img src="文件名">）
      const imgMatch=frontHtml.match(/src="([^"]+\.(jpg|jpeg|png|gif|webp))"/i);
      if(imgMatch){
        const fname=imgMatch[1];
        const zidx=nameToIdx[fname];
        if(zidx!=null){
          const buf=await zip.file(zidx).async('arraybuffer');
          const blob=new Blob([buf],{type:'image/jpeg'});
          const dataUrl=await blobToDataUrl(blob);
          card.imageBlob=blob;card.imageDataUrl=dataUrl;
          card.imageSizeKB=Math.round(blob.size/1024);card.origKB=card.imageSizeKB;
        }
      }

      // 提取音频文件名（Audio字段 [sound:文件名]）
      const sndMatch=audioField.match(/\[sound:([^\]]+)\]/);
      if(sndMatch){
        const fname=sndMatch[1];
        const zidx=nameToIdx[fname];
        if(zidx!=null){
          const buf=await zip.file(zidx).async('arraybuffer');
          const ext=fname.split('.').pop().toLowerCase();
          const mime={'m4a':'audio/mp4','mp3':'audio/mpeg','ogg':'audio/ogg','webm':'audio/webm'}[ext]||'audio/mp4';
          const blob=new Blob([buf],{type:mime});
          const url=URL.createObjectURL(blob);
          card.audioBlob=blob;card.audioName=fname;card.audioExt=ext;card.audioDataUrl=url;
        }
      }

      imported.push(card);
    }
    db.close();

    if(imported.length===0){
      statusEl.textContent='未找到有效卡片（所有卡片均无名称）';return;
    }

    cards=imported;
    selectMode('import');
    btnEl.className='import-btn ok';
    statusEl.textContent=`✓ 已解析 ${imported.length} 张卡片，牌组：${deckName}`;
    statusEl.className='import-status ok';
    updateStep0Btn();

  }catch(err){
    statusEl.textContent='解析失败：'+err.message;
    console.error(err);
  }
}

function blobToDataUrl(blob){
  return new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(blob);});
}

function addCard(){
  const id=Date.now()+Math.random();
  cards.push({id,name:'',imageDataUrl:null,imageBlob:null,imageSizeKB:null,origKB:null,
    audioBlob:null,audioName:null,audioDataUrl:null,audioExt:'m4a'});

  setTimeout(()=>{
    const el=document.getElementById('ci-'+id);

}

function removeCard(id){
  if(!confirm('删除这张卡片？'))return;
  cards=cards.filter(c=>String(c.id)!==String(id));
  if(currentEditId===id)currentEditId=null;
  renderList();
}

function toggleEdit(id){
  currentEditId=(currentEditId===id)?null:id;
  renderList();
  if(currentEditId){
    setTimeout(()=>{
      const el=document.getElementById('ci-'+id);
      el&&el.scrollIntoView({behavior:'smooth',block:'nearest'});
    },60);
  }
}

function upd(id,field,val){
  const c=cards.find(c=>String(c.id)===String(id));
  if(c){c[field]=val;updateStep1Btn();}
}

function updateStep1Btn(){
  const ok=cards.length>0&&cards.every(c=>c.name.trim()&&c.imageBlob);

function buildEditSection(card){

  const imgSizeText=card.imageDataUrl?`已压缩 ${card.imageSizeKB}KB（原 ${card.origKB}KB）`:'';
  const recOk=!!card.audioBlob;
  const recBtnText=recOk?'🎙 重新录音':'🎙 开始录音';
  const recStatusText=recOk?`✓ 录音完成（${card.audioExt}）`:'点按钮开始录音';
  const playerHtml=card.audioDataUrl?`<div class="rec-player" style="display:block"><audio controls src="${card.audioDataUrl}"></audio></div>`:'<div class="rec-player"></div>';

  return `
    <div class="edit-section">
      <div class="edit-label">名称</div>
      <input class="edit-name-input" type="text" placeholder="物品名称"
        value="${esc(card.name)}"
        oninput="upd('${card.id}','name',this.value);document.querySelector('#ci-${card.id} .card-name').textContent=this.value||'未填名称';document.querySelector('#ci-${card.id} .card-name').className=this.value?'card-name':'card-name empty'">
    </div>

    <div class="edit-section">
      <div class="edit-label">图片</div>
      <div class="img-edit-row">
        <div class="img-preview" id="ip-${card.id}">
          ${card.imageDataUrl?`<img src="${card.imageDataUrl}">`:'📷'}
        </div>
        <div>
          <div class="${imgBtnClass}" id="ib-${card.id}">
            ${imgBtnText}
            <input type="file" accept="image/*" onchange="handleImg(event,'${card.id}')">
          </div>

        </div>
      </div>
    </div>

      <div class="edit-label">录音</div>
      <div class="rec-area ${recOk?'ok':''}" id="ra-${card.id}">
        <button class="rec-btn" id="rb-${card.id}" onclick="toggleRec('${card.id}')">${recBtnText}</button>
        <div class="rec-status ${recOk?'ok':''}" id="rs-${card.id}">${recStatusText}</div>

// ── 图片处理 ──────────────────────────────────────────
async function handleImg(e,cardId){
  const file=e.target.files[0];if(!file)return;
  const card=cards.find(c=>String(c.id)===String(cardId));
  const r=await compressImage(file,getQ());
  card.imageDataUrl=r.dataUrl;card.imageBlob=r.blob;card.imageSizeKB=r.sizeKB;card.origKB=r.origKB;
  // 更新局部UI，不重新渲染整个列表（避免打断编辑状态）
  const ip=document.getElementById('ip-'+cardId);
  if(ip)ip.innerHTML=`<img src="${r.dataUrl}">`;
  const ib=document.getElementById('ib-'+cardId);
  if(ib){ib.className='img-replace-btn ok';ib.childNodes[0].textContent='重新拍照 / 选图';}
  const is=document.getElementById('is-'+cardId);
  if(is)is.textContent=`已压缩 ${r.sizeKB}KB（原 ${r.origKB}KB）`;
  // 更新折叠行缩略图
  const thumb=document.querySelector(`#ci-${cardId} .card-thumb`);
  if(thumb)thumb.innerHTML=`<img src="${r.dataUrl}">`;
  updateStep1Btn();
}

function compressImage(file,quality){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const scale=Math.min(1,600/Math.max(img.width,img.height));
        const w=Math.round(img.width*scale),h=Math.round(img.height*scale);
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        const ctx=canvas.getContext('2d');
        ctx.fillStyle='#FFF';ctx.fillRect(0,0,w,h);
        ctx.drawImage(img,0,0,w,h);
        canvas.toBlob(blob=>{
          const r=new FileReader();
          r.onload=ev=>resolve({dataUrl:ev.target.result,blob,
            sizeKB:Math.round(blob.size/1024),origKB:Math.round(file.size/1024)});
          r.readAsDataURL(blob);
        },'image/jpeg',quality);
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── 录音 ──────────────────────────────────────────────
async function toggleRec(cardId){
  const card=cards.find(c=>String(c.id)===String(cardId));
  const btn=document.getElementById('rb-'+cardId);
  const status=document.getElementById('rs-'+cardId);
  const area=document.getElementById('ra-'+cardId);

  // 停止当前录音
  if(mediaRecorder&&mediaRecorder.state==='recording'){
    if(mediaRecorder._id===cardId){mediaRecorder.stop();return;}
    else mediaRecorder.stop();
  }

  let stream;
  try{stream=await navigator.mediaDevices.getUserMedia({audio:true});}
  catch{status.textContent='⚠ 请允许麦克风权限';return;}

  const chunks=[];
  let mimeType='audio/webm',ext='webm';
  if(!MediaRecorder.isTypeSupported('audio/webm')){
    if(MediaRecorder.isTypeSupported('audio/mp4')){mimeType='audio/mp4';ext='m4a';}
    else{mimeType='';ext='webm';}
  }
  mediaRecorder=new MediaRecorder(stream,mimeType?{mimeType}:{});
  mediaRecorder._id=cardId;

  mediaRecorder.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
  mediaRecorder.onstop=()=>{
    stream.getTracks().forEach(t=>t.stop());
    const blob=new Blob(chunks,{type:mimeType||'audio/webm'});
    const url=URL.createObjectURL(blob);
    card.audioBlob=blob;card.audioName=`录音.${ext}`;card.audioExt=ext;card.audioDataUrl=url;
    btn.classList.remove('recording');btn.textContent='🎙 重新录音';
    area.className='rec-area ok';
    status.textContent=`✓ 录音完成（${ext}）`;status.className='rec-status ok';
    const player=document.getElementById('ra-'+cardId)?.querySelector('.rec-player');
    if(player){player.style.display='block';player.innerHTML=`<audio controls src="${url}"></audio>`;}
  };

  mediaRecorder.start(100);
  btn.classList.add('recording');btn.textContent='⏹ 停止录音';
  status.textContent='🔴 录音中… 说完点停止';status.className='rec-status';
}

// ═══════════════════════════════════════════════════════
// STEP 3：生成 & 下载
// ═══════════════════════════════════════════════════════
async function buildApkg(){
  const btn=document.getElementById('btn-gen');
  btn.textContent='生成中…';btn.disabled=true;
  try{
    if(!window.SQL){
      await loadScript('https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.min.js');
      window.SQL=await initSqlJs({locateFile:f=>'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/'+f});
    }
    if(!window.JSZip) await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');
    apkgBlob=await genApkg();
    let ti=0,ts=0;
    cards.forEach(c=>{if(c.imageSizeKB)ti+=c.imageSizeKB;if(c.audioBlob)ts+=Math.round(c.audioBlob.size/1024);});
    document.getElementById('result-detail').innerHTML=
      `牌组：<strong>${esc(deckName)}</strong><br>共 <strong>${cards.length}</strong> 张卡片 ｜ 图片 <strong>${fmtKB(ti)}</strong> ｜ 录音 <strong>${fmtKB(ts)}</strong>`;
    goStep(3);
  }catch(err){
    const eb=document.getElementById('preview-err');
    eb.textContent='生成失败：'+err.message;eb.style.display='block';
    console.error(err);
  }finally{btn.textContent='✦ 生成 .apkg';btn.disabled=false;}
}

function downloadApkg(){
  if(!apkgBlob)return;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(apkgBlob);
  a.download=deckName+'.apkg';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}

async function genApkg(){
  const MODEL_ID=1731234567930,DECK_ID=1731234567931;
  const now=Math.floor(Date.now()/1000),SEP='\x1f';
  const mediaIndex={},mediaFiles=[];let mIdx=0;

  for(const card of cards){
    if(card.imageBlob){
      const fname=`img_${mIdx}.jpg`;card._img=fname;
      mediaIndex[String(mIdx)]=fname;
      mediaFiles.push({idx:mIdx,buf:await card.imageBlob.arrayBuffer()});mIdx++;
    }else card._img=null;
    if(card.audioBlob){
      const fname=`snd_${mIdx}.${card.audioExt||'m4a'}`;card._snd=fname;
      mediaIndex[String(mIdx)]=fname;
      mediaFiles.push({idx:mIdx,buf:await card.audioBlob.arrayBuffer()});mIdx++;
    }else card._snd=null;
  }

  const css=`.card{font-family:'PingFang SC','Heiti SC','Microsoft YaHei',sans-serif;text-align:center;background:#FFF!important;color:#111!important;padding:0;margin:0}.night_mode .card{background:#FFF!important;color:#111!important}.img-wrap{width:85vw;height:85vw;max-width:500px;max-height:500px;margin:12px auto 0;display:flex;align-items:center;justify-content:center;border-radius:20px;overflow:hidden}.img-wrap img{width:100%;height:100%;object-fit:contain}.q-hint{font-size:20px;color:#CCC;letter-spacing:5px;margin:14px 0 20px}.divider{border:none;border-top:2px solid #EEE;margin:10px 24px 0}.ans-name{font-size:min(20vw,80px);font-weight:700;color:#111!important;letter-spacing:8px;margin:16px 0 24px;line-height:1.2}`;
  const qfmt='<div class="img-wrap">{{Front}}</div><p class="q-hint">这 是 什 么 ？</p>';
  const afmt='<div class="img-wrap">{{Front}}</div><hr class="divider">{{Audio}}<p class="ans-name">{{Name}}</p>';

  const modelObj={[MODEL_ID]:{id:MODEL_ID,name:'认知训练v4',type:0,mod:now,usn:-1,sortf:0,did:null,
    tmpls:[{name:'卡片',ord:0,qfmt,afmt,bqfmt:'',bafmt:'',did:null,bfont:'',bsize:0}],
    flds:[{name:'Front',ord:0,sticky:false,rtl:false,font:'Arial',size:20,media:[]},
          {name:'Name',ord:1,sticky:false,rtl:false,font:'Arial',size:20,media:[]},
          {name:'Audio',ord:2,sticky:false,rtl:false,font:'Arial',size:20,media:[]}],
    css,latexPre:'',latexPost:'',tags:[],vers:[]}};
  const deckObj={[DECK_ID]:{id:DECK_ID,name:deckName,desc:'',extendRev:50,usn:-1,
    collapsed:false,browserCollapsed:false,newToday:[0,0],revToday:[0,0],lrnToday:[0,0],timeToday:[0,0],dyn:0,conf:1,mod:now},
    '1':{id:1,name:'Default',conf:1,extendRev:50,usn:0,collapsed:false,browserCollapsed:false,
         newToday:[0,0],revToday:[0,0],lrnToday:[0,0],timeToday:[0,0],dyn:0,mod:now}};
  const dconfObj={'1':{id:1,name:'Default',replayq:true,
    lapse:{leechFails:8,minInt:1,delays:[10],leechAction:0,mult:0},
    rev:{perDay:100,fuzz:.05,ivlFct:1,maxIvl:36500,ease4:1.3,bury:true,minSpace:1},
    timer:0,maxTaken:60,usn:0,
    new:{perDay:5,delays:[1,10],separate:true,ints:[1,4,7],initialFactor:2500,bury:true,order:1},
    mod:now,autoplay:true}};
  const confObj={nextPos:1,estTimes:true,activeDecks:[1],sortType:'noteFld',timeLim:0,
    sortBackwards:false,addToCur:true,curDeck:1,newBury:true,newSpread:0,
    dueCounts:true,curModel:String(MODEL_ID),collapseTime:1200};

  const db=new SQL.Database();
  db.run(`CREATE TABLE col(id integer primary key,crt integer not null,mod integer not null,scm integer not null,ver integer not null,dty integer not null,usn integer not null,ls integer not null,conf text not null,models text not null,decks text not null,dconf text not null,tags text not null)`);
  db.run(`CREATE TABLE notes(id integer primary key,guid text not null,mid integer not null,mod integer not null,usn integer not null,tags text not null,flds text not null,sfld text not null,csum integer not null,flags integer not null,data text not null)`);
  db.run(`CREATE TABLE cards(id integer primary key,nid integer not null,did integer not null,ord integer not null,mod integer not null,usn integer not null,type integer not null,queue integer not null,due integer not null,ivl integer not null,factor integer not null,reps integer not null,lapses integer not null,left integer not null,odue integer not null,odid integer not null,flags integer not null,data text not null)`);
  db.run(`CREATE TABLE revlog(id integer primary key,cid integer not null,usn integer not null,ease integer not null,ivl integer not null,lastIvl integer not null,factor integer not null,time integer not null,type integer not null)`);
  db.run(`CREATE TABLE graves(usn integer not null,oid integer not null,type integer not null)`);
  db.run('INSERT INTO col VALUES(?,?,?,?,?,?,?,?,?,?,?,?,?)',[1,now,now,now*1000,11,0,-1,0,
    JSON.stringify(confObj),JSON.stringify(modelObj),JSON.stringify(deckObj),JSON.stringify(dconfObj),'{}']);

  const sha1=async s=>{
    const b=await crypto.subtle.digest('SHA-1',new TextEncoder().encode(s));
    return parseInt(Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('').slice(0,8),16);
  };
  const rg=()=>Math.floor(Math.random()*0xFFFFFFFF).toString(16).padStart(8,'0');

  for(let i=0;i<cards.length;i++){
    const card=cards[i];
    const nid=now*1000+i,cid=now*1000+i+500;
    const frontHtml=card._img?`<img src="${card._img}">`:`<div style="font-size:60px;padding:40px">🖼</div>`;
    const audioField=card._snd?`[sound:${card._snd}]`:`{{tts zh_CN:Name}}`;
    const flds=frontHtml+SEP+(card.name||'')+SEP+audioField;
    const csum=await sha1(frontHtml);
    db.run('INSERT INTO notes VALUES(?,?,?,?,?,?,?,?,?,?,?)',[nid,rg(),MODEL_ID,now,-1,'',flds,frontHtml,csum,0,'']);
    db.run('INSERT INTO cards VALUES(?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?)',[cid,nid,DECK_ID,0,now,-1,0,0,i+1,0,0,0,0,0,0,0,0,'']);
  }

  const dbBytes=db.export();db.close();
  const zip=new JSZip();
  zip.file('collection.anki2',dbBytes);
  zip.file('media',JSON.stringify(mediaIndex));
  for(const{idx,buf}of mediaFiles)zip.file(String(idx),buf);
  return await zip.generateAsync({type:'blob',compression:'DEFLATE',compressionOptions:{level:6}});
}
