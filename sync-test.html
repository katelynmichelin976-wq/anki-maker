<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>忆海拾光 · 同步验证 v11</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #7d8590;
    --mom: #f78166;
    --caregiver: #79c0ff;
    --warn: #ff7b72;
    --success: #56d364;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, 'PingFang SC', sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 24px 16px;
  }
  .header { text-align: center; margin-bottom: 28px; }
  .header svg { display: block; margin: 0 auto 8px; }
  .header h1 { font-size: 20px; font-weight: 600; letter-spacing: 0.05em; }
  .header p { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .role-pick {
    width: 100%; max-width: 360px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px; text-align: center;
  }
  .role-pick h2 { font-size: 16px; margin-bottom: 20px; color: var(--muted); }
  .role-btns { display: flex; gap: 12px; }
  .role-btn {
    flex: 1; padding: 16px 8px; border-radius: 10px;
    border: 2px solid var(--border); background: transparent;
    color: var(--text); font-size: 15px; cursor: pointer; transition: all .2s;
  }
  .role-btn .icon { font-size: 28px; display: block; margin-bottom: 8px; }
  .role-btn.mom { border-color: var(--mom); color: var(--mom); }
  .role-btn.caregiver { border-color: var(--caregiver); color: var(--caregiver); }
  .main { width: 100%; max-width: 420px; display: none; flex-direction: column; gap: 16px; }
  .main.visible { display: flex; }
  .role-tag {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 14px; border-radius: 20px;
    font-size: 13px; font-weight: 600; letter-spacing: 0.04em;
  }
  .role-tag.mom { background: rgba(247,129,102,.15); color: var(--mom); border: 1px solid rgba(247,129,102,.3); }
  .role-tag.caregiver { background: rgba(121,192,255,.15); color: var(--caregiver); border: 1px solid rgba(121,192,255,.3); }
  .status-bar {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px;
    font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 8px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; transition: background .3s; }
  .dot.connecting { background: #e3b341; animation: pulse 1s infinite; }
  .dot.connected { background: var(--success); }
  .dot.error { background: var(--warn); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .card-display {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px 24px; text-align: center;
    transition: border-color .4s, background .4s; min-height: 160px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
  }
  .card-display.struggling { border-color: var(--warn); background: rgba(255,123,114,.06); animation: shake .4s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  .card-display .deck { font-size: 12px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; }
  .card-display .card-num { font-size: 52px; font-weight: 700; line-height: 1; }
  .card-display .card-name { font-size: 22px; font-weight: 500; }
  .card-display .struggling-label { font-size: 13px; color: var(--warn); display: none; }
  .card-display.struggling .struggling-label { display: block; }
  .card-display .empty { color: var(--muted); font-size: 15px; }
  .cards-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .card-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 8px; color: var(--text);
    font-size: 14px; cursor: pointer; transition: all .15s; text-align: center;
  }
  .card-btn .num { font-size: 20px; font-weight: 700; color: var(--mom); }
  .card-btn .name { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .card-btn:hover { border-color: var(--mom); background: rgba(247,129,102,.06); }
  .card-btn.active { border-color: var(--mom); background: rgba(247,129,102,.12); }
  .struggle-btn {
    width: 100%; padding: 14px; border-radius: 10px;
    border: 1px solid var(--border); background: transparent;
    color: var(--muted); font-size: 14px; cursor: pointer; transition: all .2s;
  }
  .struggle-btn:hover { border-color: var(--warn); color: var(--warn); }
  .struggle-btn.active { border-color: var(--warn); color: var(--warn); background: rgba(255,123,114,.1); }
  .log { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .log-title { padding: 10px 14px; font-size: 12px; color: var(--muted); border-bottom: 1px solid var(--border); letter-spacing: .06em; text-transform: uppercase; }
  .log-list {
    padding: 10px 14px; font-size: 12px; font-family: 'SF Mono', 'Menlo', monospace;
    color: var(--muted); max-height: 120px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 4px;
  }
  .log-item { display: flex; gap: 8px; }
  .log-item .time { color: #30363d; flex-shrink: 0; }
  .log-item.in .msg { color: var(--caregiver); }
  .log-item.out .msg { color: var(--mom); }
  .log-item.sys .msg { color: var(--muted); }
  .latency { font-size: 12px; color: var(--muted); text-align: center; }
  .latency span { color: var(--success); font-weight: 600; }
  .presence-bar {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px;
    font-size: 13px; display: flex; align-items: center; gap: 8px;
  }
  .presence-bar .label { color: var(--muted); }
  .presence-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border); flex-shrink: 0; transition: background .4s;
  }
  .presence-dot.online { background: var(--success); box-shadow: 0 0 6px var(--success); }
  .presence-name { font-weight: 500; transition: color .4s; }
  .presence-name.online { color: var(--success); }
  .presence-name.offline { color: var(--muted); }
</style>
</head>
<body>

<div class="header">
  <svg width="48" height="32" viewBox="0 0 48 32" fill="none">
    <circle cx="8" cy="6" r="1.2" fill="#e6edf3" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.2;0.9" dur="3.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="3" r="0.8" fill="#e6edf3" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.1;0.7" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="34" cy="5" r="1" fill="#e6edf3" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.15;0.8" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="42" cy="2" r="0.7" fill="#e6edf3" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.7s" repeatCount="indefinite"/>
    </circle>
    <path d="M26 8 L27 10 L29 11 L27 12 L26 14 L25 12 L23 11 L25 10 Z" fill="#e6edf3" opacity="0.95">
      <animate attributeName="opacity" values="0.95;0.5;0.95" dur="4.2s" repeatCount="indefinite"/>
    </path>
    <path d="M0 22 Q6 18 12 22 Q18 26 24 22 Q30 18 36 22 Q42 26 48 22" stroke="#79c0ff" stroke-width="1.2" fill="none" opacity="0.6">
      <animate attributeName="d" values="M0 22 Q6 18 12 22 Q18 26 24 22 Q30 18 36 22 Q42 26 48 22;M0 24 Q6 20 12 24 Q18 28 24 24 Q30 20 36 24 Q42 28 48 24;M0 22 Q6 18 12 22 Q18 26 24 22 Q30 18 36 22 Q42 26 48 22" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M0 26 Q6 22 12 26 Q18 30 24 26 Q30 22 36 26 Q42 30 48 26" stroke="#79c0ff" stroke-width="0.8" fill="none" opacity="0.35">
      <animate attributeName="d" values="M0 26 Q6 22 12 26 Q18 30 24 26 Q30 22 36 26 Q42 30 48 26;M0 28 Q6 24 12 28 Q18 32 24 28 Q30 24 36 28 Q42 32 48 28;M0 26 Q6 22 12 26 Q18 30 24 26 Q30 22 36 26 Q42 30 48 26" dur="2.2s" repeatCount="indefinite"/>
    </path>
  </svg>
  <h1>忆海拾光<span id="versionTag" style="font-size:12px;font-weight:400;color:var(--muted);margin-left:6px;letter-spacing:0;"></span></h1>
  <p>实时同步验证</p>
</div>

<div class="role-pick" id="rolePick">
  <h2>你是谁？</h2>
  <div class="role-btns">
    <button class="role-btn mom" onclick="selectRole('mom')">
      <span class="icon">👵</span>妈妈
    </button>
    <button class="role-btn caregiver" onclick="selectRole('caregiver')">
      <span class="icon">👨</span>照护者
    </button>
  </div>
</div>

<div class="main" id="main">
  <div style="display:flex;align-items:center;justify-content:space-between;">
    <div class="role-tag" id="roleTag"></div>
    <button onclick="switchRole()" style="background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;">切换角色</button>
  </div>

  <div class="status-bar">
    <div class="dot connecting" id="dot"></div>
    <span id="statusText">正在连接...</span>
  </div>

  <div class="presence-bar">
    <span class="label">对方：</span>
    <div class="presence-dot" id="presenceDot"></div>
    <span class="presence-name offline" id="presenceName">未在线</span>
  </div>

  <div class="card-display" id="cardDisplay">
    <div class="empty" id="emptyHint">等待题目...</div>
    <div class="deck" id="cardDeck" style="display:none"></div>
    <div class="card-num" id="cardNum" style="display:none"></div>
    <div class="card-name" id="cardName" style="display:none"></div>
    <div class="struggling-label">⚠️ 妈妈卡住了</div>
  </div>

  <div id="momControls" style="display:none;flex-direction:column;gap:12px;">
    <div style="font-size:12px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;">选择当前题目</div>
    <div class="cards-grid" id="cardsGrid"></div>
    <button class="struggle-btn" id="struggleBtn" onclick="toggleStruggle()">😰 我卡住了</button>
  </div>

  <div class="latency" id="latencyDiv" style="display:none">
    同步延迟：<span id="latencyVal">-</span> ms
  </div>

  <div class="log">
    <div class="log-title">同步日志</div>
    <div class="log-list" id="logList">
      <div class="log-item sys"><span class="time">--:--:--</span><span class="msg">等待连接...</span></div>
    </div>
  </div>
</div>

<script>
// ── 配置（只需改这里）────────────────────────────────
const VERSION     = 'v11'
const SUPABASE_URL = 'https://juzkonrzfyvchqxzmlpr.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1emtvbnJ6Znl2Y2hxeHptbHByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5NzM3MzEsImV4cCI6MjA4ODU0OTczMX0.8DDaZMhKlVkLD17ojz5kaXD0bZ-8qGhuo--cWAvtB3E'
const TABLE       = 'sync_session'
const ROW_ID      = 1

// ── 卡片数据 ──────────────────────────────────────────
const CARDS = [
  { id: 1, name: '苹果', deck: '水果' },
  { id: 2, name: '香蕉', deck: '水果' },
  { id: 3, name: '西瓜', deck: '水果' },
  { id: 4, name: '猫咪', deck: '动物' },
  { id: 5, name: '小狗', deck: '动物' },
  { id: 6, name: '金鱼', deck: '动物' },
]

// ── 状态 ──────────────────────────────────────────────
let role = null, sb = null, channel = null
let currentCard = null, isStruggling = false

// ── 启动 ──────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('versionTag').textContent = VERSION
  document.title = '忆海拾光 · 同步验证 ' + VERSION
  const r = new URLSearchParams(location.search).get('role')
  if (r === 'mom' || r === 'caregiver') selectRole(r)
})

async function selectRole(r) {
  role = r
  document.getElementById('rolePick').style.display = 'none'
  document.getElementById('main').classList.add('visible')
  const tag = document.getElementById('roleTag')
  tag.className = 'role-tag ' + role
  tag.textContent = role === 'mom' ? '👵 妈妈端' : '👨 照护者端'
  if (role === 'mom') {
    document.getElementById('momControls').style.display = 'flex'
    buildCardsGrid()
  } else {
    document.getElementById('latencyDiv').style.display = 'block'
  }
  await initSupabase()
}

function switchRole() {
  if (channel) sb.removeChannel(channel)
  role = null; sb = null; channel = null; currentCard = null; isStruggling = false
  document.getElementById('main').classList.remove('visible')
  document.getElementById('rolePick').style.display = 'block'
  document.getElementById('momControls').style.display = 'none'
  document.getElementById('latencyDiv').style.display = 'none'
  resetCardDisplay()
  document.getElementById('logList').innerHTML =
    '<div class="log-item sys"><span class="time">--:--:--</span><span class="msg">等待连接...</span></div>'
}

// ── Supabase 初始化 ───────────────────────────────────
async function initSupabase() {
  setStatus('connecting', '正在连接 Supabase...')
  try {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

    // 确保数据行存在
    await ensureRow()

    // 读取当前状态
    const { data } = await sb.from(TABLE).select('*').eq('id', ROW_ID).maybeSingle()
    if (data && data.card_id) handleRemoteUpdate(data)

    // 启动实时监听
    startWatch()

    setStatus('connected', '已连接')
    addLog('sys', '连接成功，实时监听已启动')

  } catch (e) {
    setStatus('error', '连接失败：' + e.message)
    addLog('sys', '错误：' + e.message)
    console.error(e)
  }
}

async function ensureRow() {
  const { data } = await sb.from(TABLE).select('id').eq('id', ROW_ID).maybeSingle()
  if (!data) {
    await sb.from(TABLE).insert({
      id: ROW_ID, card_id: null, card_name: null,
      deck_name: null, is_struggling: false, sent_at: null
    })
    addLog('sys', '初始化数据行')
  }
}

// ── 实时监听 ──────────────────────────────────────────
function startWatch() {
  const peerLabel = role === 'mom' ? '照护者' : '妈妈'

  channel = sb.channel('sync_channel', {
    config: { presence: { key: role } }
  })
    // 数据变化监听
    .on('postgres_changes', {
      event: 'UPDATE',
      schema: 'public',
      table: TABLE,
      filter: `id=eq.${ROW_ID}`
    }, (payload) => {
      handleRemoteUpdate(payload.new)
    })
    // Presence：对方上线
    .on('presence', { event: 'join' }, ({ newPresences }) => {
      const peer = role === 'mom' ? 'caregiver' : 'mom'
      if (newPresences.some(p => p.role === peer)) {
        setPresence(true, peerLabel)
        addLog('sys', `${peerLabel}已上线 👋`)
      }
    })
    // Presence：对方下线
    .on('presence', { event: 'leave' }, ({ leftPresences }) => {
      const peer = role === 'mom' ? 'caregiver' : 'mom'
      if (leftPresences.some(p => p.role === peer)) {
        setPresence(false, peerLabel)
        addLog('sys', `${peerLabel}已离线`)
      }
    })
    .subscribe(async (status) => {
      if (status === 'SUBSCRIBED') {
        addLog('sys', 'WebSocket 已就绪')
        // 广播自己的在线状态
        await channel.track({ role })
        // 检查对方是否已在线
        const state = channel.presenceState()
        const peer = role === 'mom' ? 'caregiver' : 'mom'
        const peerOnline = Object.values(state).flat().some(p => p.role === peer)
        setPresence(peerOnline, peerLabel)
      }
    })
}

function setPresence(online, name) {
  const dot = document.getElementById('presenceDot')
  const label = document.getElementById('presenceName')
  dot.className = 'presence-dot ' + (online ? 'online' : '')
  label.className = 'presence-name ' + (online ? 'online' : 'offline')
  label.textContent = online ? name + ' 在线' : name + ' 未在线'
}

function handleRemoteUpdate(data) {
  if (!data.card_id) return
  if (role === 'caregiver') {
    if (data.sent_at) {
      const ms = Date.now() - new Date(data.sent_at).getTime()
      if (ms > 0 && ms < 30000) document.getElementById('latencyVal').textContent = ms
    }
    addLog('in', `收到 · 第${data.card_id}题「${data.card_name}」${data.is_struggling ? ' ⚠️卡住了' : ''}`)
    if (data.is_struggling && navigator.vibrate) navigator.vibrate([200, 100, 200])
  }
  updateCardDisplay(data.card_id, data.card_name, data.deck_name, data.is_struggling)
}

// ── 妈妈端操作 ────────────────────────────────────────
function buildCardsGrid() {
  const grid = document.getElementById('cardsGrid')
  grid.innerHTML = ''
  CARDS.forEach(c => {
    const btn = document.createElement('button')
    btn.className = 'card-btn'
    btn.id = 'card-btn-' + c.id
    btn.innerHTML = `<div class="num">${c.id}</div><div class="name">${c.name}</div>`
    btn.onclick = () => selectCard(c)
    grid.appendChild(btn)
  })
}

async function selectCard(card) {
  if (!sb) return
  currentCard = card; isStruggling = false
  document.querySelectorAll('.card-btn').forEach(b => b.classList.remove('active'))
  document.getElementById('card-btn-' + card.id)?.classList.add('active')
  document.getElementById('struggleBtn').classList.remove('active')
  document.getElementById('struggleBtn').textContent = '😰 我卡住了'
  updateCardDisplay(card.id, card.name, card.deck, false)
  addLog('out', `发送 · 第${card.id}题「${card.name}」`)
  const { error } = await sb.from(TABLE).update({
    card_id: card.id, card_name: card.name, deck_name: card.deck,
    is_struggling: false, sent_at: new Date().toISOString()
  }).eq('id', ROW_ID)
  if (error) addLog('sys', '发送失败：' + error.message)
}

async function toggleStruggle() {
  if (!currentCard || !sb) return
  isStruggling = !isStruggling
  const btn = document.getElementById('struggleBtn')
  btn.classList.toggle('active', isStruggling)
  btn.textContent = isStruggling ? '✅ 已标记卡住' : '😰 我卡住了'
  updateCardDisplay(currentCard.id, currentCard.name, currentCard.deck, isStruggling)
  addLog('out', isStruggling ? '发送 · 卡住了！' : '发送 · 继续了')
  const { error } = await sb.from(TABLE).update({
    is_struggling: isStruggling, sent_at: new Date().toISOString()
  }).eq('id', ROW_ID)
  if (error) addLog('sys', '发送失败：' + error.message)
}

// ── UI ────────────────────────────────────────────────
function updateCardDisplay(cardId, cardName, deckName, struggling) {
  document.getElementById('emptyHint').style.display = 'none'
  document.getElementById('cardDeck').style.display = 'block'
  document.getElementById('cardNum').style.display = 'block'
  document.getElementById('cardName').style.display = 'block'
  document.getElementById('cardDeck').textContent = deckName
  document.getElementById('cardNum').textContent = String(cardId).padStart(2, '0')
  document.getElementById('cardNum').style.color = struggling ? 'var(--warn)' : 'var(--mom)'
  document.getElementById('cardName').textContent = cardName
  document.getElementById('cardDisplay').classList.toggle('struggling', struggling)
}

function resetCardDisplay() {
  document.getElementById('emptyHint').style.display = 'block'
  document.getElementById('cardDeck').style.display = 'none'
  document.getElementById('cardNum').style.display = 'none'
  document.getElementById('cardName').style.display = 'none'
  document.getElementById('cardDisplay').classList.remove('struggling')
}

function setStatus(state, text) {
  document.getElementById('dot').className = 'dot ' + state
  document.getElementById('statusText').textContent = text
}

function addLog(type, msg) {
  const list = document.getElementById('logList')
  const time = new Date().toTimeString().slice(0, 8)
  const item = document.createElement('div')
  item.className = 'log-item ' + type
  item.innerHTML = `<span class="time">${time}</span><span class="msg">${msg}</span>`
  list.appendChild(item)
  list.scrollTop = list.scrollHeight
  while (list.children.length > 20) list.removeChild(list.firstChild)
}
</script>
</body>
</html>
